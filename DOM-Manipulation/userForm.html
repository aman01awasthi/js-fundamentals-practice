<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
        }

        .toggleBtn {
            text-align: end;
            margin-bottom: 20px;
        }

        .toggleBtn button {
            border-radius: 6px;
        }

        form {
            max-width: 450px;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        form label {
            font-weight: 500;
            margin-top: 10px;
        }

        form input {
            width: 100%;
            padding: 8px 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            transition: 0.2s ease;
        }

        form input:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13,110,253,0.15);
        }

        form button {
            width: 100%;
            border-radius: 6px;
            font-weight: 500;
        }

        #container {
            max-width: 450px;
            margin: 30px auto;
            list-style: none;
            padding: 0;
        }

        #container li {
            /* background: #ffffff; */
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #nameError, #emailError{
            color: red;
            margin: 0px;
        }
        .form-control{
            margin-bottom: 5px;
        }
        .dark-mode{
            background: #000;
            color: white;
        }
    </style>
</head>

<body>
    <div class="toggleBtn">
        <button class="btn btn-outline-success" id="toggleColor">Toggle</button>
    </div>

    <form id="formData">
        <label for="name" class="form-label">Name</label>
        <input type="text" name="name" id="name" class="form-control">
        <p id="nameError"></p>
        
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control">
        <p id="emailError"></p>

        <button class="btn btn-primary mt-2" type="submit">Submit</button>
    </form>

    <div class="container mt-4" id="container"></div>

    <script src="index.js"></script>
</body>
</html>
